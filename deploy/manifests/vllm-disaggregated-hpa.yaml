apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-prefill-hpa
  namespace: kimi-k25
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kimi-k25-vllm-prefill
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Pods
    pods:
      metric:
        name: prometheus.googleapis.com|vllm:num_requests_waiting|gauge
      target:
        type: AverageValue
        averageValue: "5"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-decode-hpa
  namespace: kimi-k25
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kimi-k25-vllm-decode
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: prometheus.googleapis.com|vllm:gpu_cache_usage_perc|gauge
      target:
        type: AverageValue
        averageValue: "0.8"
