apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-epp-config
  namespace: kimi-k25
data:
  config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
    schedulingProfiles:
      - name: default
        plugins:
          - pluginRef: queue-scorer
            weight: 1
          - pluginRef: kv-cache-utilization-scorer
            weight: 1
          - pluginRef: prefix-cache-scorer
            weight: 5
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kimi-epp-sa
  namespace: kimi-k25
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kimi-epp-role
  namespace: kimi-k25
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kimi-epp-rb
  namespace: kimi-k25
subjects:
- kind: ServiceAccount
  name: kimi-epp-sa
  namespace: kimi-k25
roleRef:
  kind: Role
  name: kimi-epp-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimi-epp
  namespace: kimi-k25
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kimi-epp
  template:
    metadata:
      labels:
        app: kimi-epp
    spec:
      serviceAccountName: kimi-epp-sa
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - default-pool
      containers:
      - name: endpoint-picker
        image: registry.k8s.io/gateway-api-inference-extension/epp:v1.4.0
        args:
        - --pool-name=kimi-decode-pool
        - --pool-namespace=kimi-k25
        ports:
        - containerPort: 9002
          name: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: kimi-epp-svc
  namespace: kimi-k25
spec:
  selector:
    app: kimi-epp
  ports:
  - protocol: TCP
    port: 9002
    targetPort: 9002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimi-k25-vllm-prefill
  namespace: kimi-k25
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kimi-k25-vllm-prefill
  template:
    metadata:
      labels:
        app: kimi-k25-vllm-prefill
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: kimi-ksa
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - rtx-6000-pool
                - rtx-6000-spot-pool
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: kimi-k25-vllm-prefill
            topologyKey: "kubernetes.io/hostname"
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "present"
        effect: "NoSchedule"
      containers:
      - name: vllm-server
        image: us-central1-docker.pkg.dev/gpu-launchpad-playground/kimi-repo/vllm-openai:latest
        env:
        - name: ENABLE_NVFP4_SM120
          value: "1"
        - name: VLLM_USE_V1
          value: "0"
        - name: VLLM_ATTENTION_BACKEND
          value: "FLASHINFER"
        - name: VLLM_NIXL_SIDE_CHANNEL_PORT
          value: "30002"
        command: ["/bin/bash", "-c"]
        args:
        - |
          python3 -m vllm.entrypoints.openai.api_server \
            --model /models \
            --tensor-parallel-size 8 \
            --enable-expert-parallel \
            --gpu-memory-utilization 0.95 \
            --max-model-len 65536 \
            --kv-cache-dtype fp8 \
            --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_producer"}' \
            --trust-remote-code \
            --port 30001 \
            --host 0.0.0.0
        ports:
        - containerPort: 30001
        - containerPort: 30002
        resources:
          limits:
            nvidia.com/gpu: 8
        volumeMounts:
        - name: model-weights
          mountPath: /models
          readOnly: true
      volumes:
      - name: model-weights
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: kimi-k25-weights-bucket-gpu-launchpad-playground
            mountOptions: "implicit-dirs,only-dir:Kimi-K2.5-NVFP4/"
---
apiVersion: apps/v1
kind: Deployment
