            mountOptions: "implicit-dirs,only-dir:Kimi-K2.5-NVFP4/"
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: kimi-prefill-pool
  namespace: kimi-k25
spec:
  endpointPickerRef:
    name: kimi-epp-svc
    port:
      number: 9002
  selector:
    matchLabels:
      app: kimi-k25-vllm-prefill
  targetPorts:
  - number: 30001
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: kimi-decode-pool
  namespace: kimi-k25
spec:
  endpointPickerRef:
    name: kimi-epp-svc
    port:
      number: 9002
  selector:
    matchLabels:
      app: kimi-k25-vllm-decode
  targetPorts:
  - number: 30001
---
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: kimi-disaggregated-objective
  namespace: kimi-k25
spec:
  priority: 10
  poolRef:
    name: kimi-decode-pool
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kimi-gateway-disaggregated
  namespace: kimi-k25
spec:
  gatewayClassName: gke-l7-rilb
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kimi-route-disaggregated
  namespace: kimi-k25
spec:
  parentRefs:
  - name: kimi-gateway-disaggregated
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
    - path:
        type: PathPrefix
        value: /v1/completions
    backendRefs:
    - group: inference.networking.x-k8s.io
      kind: InferenceObjective
      name: kimi-disaggregated-objective
      port: 30001
