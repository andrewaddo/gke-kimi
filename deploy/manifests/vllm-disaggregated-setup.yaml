            --max-model-len 65536 \
            --kv-cache-dtype fp8 \
            --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_consumer"}' \
            --trust-remote-code \
            --port 30001 \
            --host 0.0.0.0
