apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimi-k25-vllm
  namespace: kimi-k25
spec:
  replicas: 4
  selector:
    matchLabels:
      app: kimi-k25-vllm
  template:
    metadata:
      labels:
        app: kimi-k25-vllm
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
    spec:
      serviceAccountName: kimi-ksa
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - rtx-6000-pool
                - rtx-6000-spot-pool
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: kimi-k25-vllm
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: vllm-server
        image: us-central1-docker.pkg.dev/gpu-launchpad-playground/kimi-repo/vllm-openai:latest
        env:
        - name: ENABLE_NVFP4_SM120
          value: "1"
        - name: VLLM_ATTENTION_BACKEND
          value: "FLASHINFER"
        - name: VLLM_SERVER_DEV_MODE
          value: "1"
        - name: VLLM_USE_V1
          value: "0"
        - name: NCCL_DEBUG
          value: "INFO"
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "Starting vLLM Server on G4 Blackwell Farm (NVFP4)..."
          python3 -m vllm.entrypoints.openai.api_server \
            --model /models \
            --tensor-parallel-size 8 \
            --enable-expert-parallel \
            --compilation_config.pass_config.fuse_allreduce_rms true \
            --mm-encoder-tp-mode data \
            --gpu-memory-utilization 0.95 \
            --max-model-len 65536 \
            --kv-cache-dtype fp8 \
            --enable-prefix-caching \
            --trust-remote-code \
            --port 30001 \
            --host 0.0.0.0 \
            --tool-call-parser kimi_k2 \
            --reasoning-parser kimi_k2
        ports:
        - containerPort: 30001
        resources:
          limits:
            nvidia.com/gpu: 8
        volumeMounts:
        - name: model-weights
          mountPath: /models
          readOnly: true
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-weights
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: kimi-k25-weights-bucket-gpu-launchpad-playground
            mountOptions: "metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1,metadata-cache:negative-ttl-secs:0,file-cache:max-size-mb:-1,file-cache:cache-file-for-range-read:true,file-cache:enable-parallel-downloads:true,implicit-dirs,only-dir:Kimi-K2.5-NVFP4/"
            skipCSIBucketAccessCheck: "true"
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 10Gi
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "present"
        effect: "NoSchedule"
