apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: kimi-health-check-policy
  namespace: kimi-k25
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
  targetRef:
    group: inference.networking.k8s.io
    kind: InferencePool
    name: kimi-unified-pool
