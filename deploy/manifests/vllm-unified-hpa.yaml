apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-unified-hpa
  namespace: kimi-k25
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kimi-k25-vllm
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: prometheus.googleapis.com|vllm:num_requests_running|gauge
      target:
        type: AverageValue
        averageValue: "5"
