apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kimi-gateway
  namespace: kimi-k25
spec:
  gatewayClassName: gke-l7-rilb
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kimi-route
  namespace: kimi-k25
spec:
  parentRefs:
  - name: kimi-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
    backendRefs:
    - group: ai.gke.io
      kind: InferencePool
      name: kimi-pool
      port: 30001
    filters:
    - type: ExtensionRef
      extensionRef:
        group: ai.gke.io
        kind: InferenceGatewayFilter
        name: prefix-routing
